<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }} — {{ site.role }}</title>
  <meta name="description" content="{{ site.description }}">
  <meta name="author" content="{{ site.title }}">
  <link rel="canonical" href="{{ site.url }}/">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ site.title }} — {{ site.role }}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:url" content="{{ site.url }}/">
  {% if site.sections.first.image %}<meta property="og:image" content="{{ site.url }}/images/{{ site.sections.first.image }}">{% endif %}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  {{ content }}

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
